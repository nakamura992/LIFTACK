services:
  laravel:
    container_name: ${APP_NAME}-laravel
    build:
      context: .
      dockerfile: ./docker/laravel/${LARAVEL_DOCKERFILE:-Dockerfile}
    volumes:
      - ./src/:/var/www/html
      - ./logs/laravel:/var/www/html/storage/logs
    environment:
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
    ports:
      - "8000:8000"

  next:
    container_name: ${APP_NAME}-next
    build:
      context: .
      dockerfile: ./docker/next/${NEXT_DOCKERFILE:-Dockerfile}
    volumes:
      - ./next/:/app
      - ./logs/next:/app/.next/logs
    depends_on:
      - laravel
    ports:
      - "3000:3000"

  nginx:
    container_name: ${APP_NAME}-nginx
    build:
      context: .
      dockerfile: ./docker/nginx/${NGINX_DOCKERFILE:-Dockerfile}
    ports:
      - ${WEB_PORT:-80}:80
      - ${USE_SSL:-false} == true && 443:443
    depends_on:
      - laravel
      - next
    volumes:
      - ./docker/nginx/${NGINX_CONF:-default.conf}:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
      - ./docker/certbot/conf:/etc/letsencrypt:ro
      - ./docker/certbot/www:/var/www/certbot:ro

  mysql:
    container_name: ${APP_NAME}-mysql
    build:
      context: .
      dockerfile: ./docker/mysql/${MYSQL_DOCKERFILE:-Dockerfile}
    environment:
      MYSQL_DATABASE: "${APP_NAME}"
      MYSQL_USER: "${APP_NAME}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    ports:
      - "3306:3306"
    volumes:
      - ${APP_NAME}-mysql-volume:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./logs/mysql:/var/log/mysql
    depends_on:
      - laravel

  mysql-backup:
    container_name: ${APP_NAME}-mysql-backup
    build:
      context: .
      dockerfile: ./docker/mysql-backup/${MYSQL_BACKUP_DOCKERFILE:-Dockerfile}
    volumes:
      - ./backup:/backup
      - ./docker/mysql-backup/backup.sh:/backup.sh
      - ./logs/mysql-backup:/var/log/mysql-backup
    environment:
      MYSQL_PWD: "${MYSQL_ROOT_PASSWORD}"
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}
      BACKUP_RETENTION: ${BACKUP_RETENTION:-7}
    command: ["/bin/sh", "-c", "chmod +x /backup.sh && /backup.sh"]
    depends_on:
      - mysql

  pma:
    container_name: ${APP_NAME}-pma
    build:
      context: .
      dockerfile: ./docker/pma/${PMA_DOCKERFILE:-Dockerfile}
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: ${PHPMYADMIN_ABSOLUTE_URI:-http://localhost/pma}
    ports:
      - "8080:80"
    volumes:
      - ./docker/pma/phpmyadmin-misc.ini:/etc/phpmyadmin/config.user.ini
    depends_on:
      - mysql

  certbot:
    image: certbot/certbot
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
      - ./docker/certbot/entrypoint.sh:/entrypoint.sh
    environment:
      - USE_SSL=${USE_SSL:-false}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - DOMAIN=${DOMAIN}
    entrypoint: ["/entrypoint.sh"]
    depends_on:
      - nginx

volumes:
  ${APP_NAME}-mysql-volume:
